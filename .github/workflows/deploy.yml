name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploy to DigitalOcean Droplet
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USERNAME: ${{ secrets.DO_USERNAME }}
          DO_PORT: ${{ secrets.DO_PORT }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_SSH_KEY_B64: ${{ secrets.DO_SSH_KEY_B64 }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          DO_HOST="$(printf '%s' "${DO_HOST}" | tr -d '\r\n' | xargs)"
          DO_USERNAME="$(printf '%s' "${DO_USERNAME}" | tr -d '\r\n' | xargs)"
          DO_PORT="$(printf '%s' "${DO_PORT:-}" | tr -d '\r\n' | xargs)"

          if [ -z "${DO_HOST}" ]; then
            echo "Missing required deployment secret: DO_HOST."
            exit 1
          fi

          if [ -z "${DO_PORT}" ]; then
            DO_PORT="22"
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          KEY_READY=0

          if [ -n "${DO_SSH_KEY_B64:-}" ]; then
            CLEANED_B64="$(printf '%s' "${DO_SSH_KEY_B64}" | tr -d '\r\n\t ')"
            if printf '%s' "${CLEANED_B64}" | base64 --decode > ~/.ssh/deploy_key 2> /dev/null; then
              KEY_READY=1
            else
              echo "DO_SSH_KEY_B64 is not valid base64. Falling back to DO_SSH_KEY if provided."
            fi
          fi

          if [ "${KEY_READY}" -ne 1 ] && [ -n "${DO_SSH_KEY:-}" ]; then
            printf '%b' "${DO_SSH_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
            KEY_READY=1
          fi

          if [ "${KEY_READY}" -ne 1 ]; then
            echo "Missing valid SSH key secret. Provide DO_SSH_KEY_B64 (preferred) or DO_SSH_KEY."
            exit 1
          fi

          chmod 600 ~/.ssh/deploy_key

          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "Invalid private key format. Check DO_SSH_KEY_B64 / DO_SSH_KEY content."
            exit 1
          fi

          ssh-keyscan -H "${DO_HOST}" >> ~/.ssh/known_hosts 2> /dev/null

          AUTH_USER=""
          CANDIDATE_USERS=()
          if [ -n "${DO_USERNAME}" ]; then
            CANDIDATE_USERS+=("${DO_USERNAME}")
          fi
          if [ "${DO_USERNAME}" != "root" ]; then
            CANDIDATE_USERS+=("root")
          fi

          for CANDIDATE_USER in "${CANDIDATE_USERS[@]}"; do
            if ssh -p "${DO_PORT}" -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes "${CANDIDATE_USER}@${DO_HOST}" "echo SSH_AUTH_OK" >/dev/null 2>&1; then
              AUTH_USER="${CANDIDATE_USER}"
              break
            fi
          done

          if [ -z "${AUTH_USER}" ]; then
            echo "SSH authentication failed for configured user and root fallback on ${DO_HOST}:${DO_PORT}. Ensure authorized_keys contains the public key for DO_SSH_KEY_B64."
            exit 1
          fi

          ssh -p "${DO_PORT}" -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes "${AUTH_USER}@${DO_HOST}" \
            "GITHUB_REF_NAME='${GITHUB_REF_NAME}' GITHUB_SHA='${GITHUB_SHA}' bash -se" <<'REMOTE_SCRIPT'
            set -euo pipefail

            APP_DIR="/var/www/gatewayhub"
            BRANCH="${GITHUB_REF_NAME}"
            TARGET_SHA="${GITHUB_SHA}"

            if [ ! -d "${APP_DIR}" ]; then
              echo "Missing app directory: ${APP_DIR}"
              exit 1
            fi

            cd "${APP_DIR}"

            if [ ! -f ".env" ]; then
              echo "Missing .env in ${APP_DIR}"
              exit 1
            fi

            git config --global --add safe.directory "${APP_DIR}" || true

            php artisan down || true
            trap 'cd "${APP_DIR}" && php artisan up || true' EXIT

            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"

            CURRENT_SHA="$(git rev-parse HEAD)"
            if [ "${CURRENT_SHA}" != "${TARGET_SHA}" ]; then
              echo "Warning: deployed HEAD (${CURRENT_SHA}) differs from workflow SHA (${TARGET_SHA})."
            fi

            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build

            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
            php artisan queue:restart

            php artisan up

            HEALTH_BODY="$(curl --silent --show-error --fail --max-time 15 http://127.0.0.1/health)"
            if [ "${HEALTH_BODY}" != "ok" ]; then
              echo "Health check failed: expected 'ok', got '${HEALTH_BODY}'"
              exit 1
            fi

            trap - EXIT
          REMOTE_SCRIPT
