name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.2.2
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: GITHUB_REF_NAME
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            APP_DIR="/var/www/gatewayhub"
            BRANCH="${GITHUB_REF_NAME}"

            if [ ! -d "${APP_DIR}" ]; then
              echo "Missing app directory: ${APP_DIR}"
              exit 1
            fi

            cd "${APP_DIR}"

            php artisan down || true
            trap 'cd "${APP_DIR}" && php artisan up || true' EXIT

            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"

            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build

            php artisan migrate --force
            php artisan optimize
            php artisan queue:restart

            php artisan up

            HEALTH_BODY="$(curl --silent --show-error --fail --max-time 15 http://127.0.0.1/health)"
            if [ "${HEALTH_BODY}" != "ok" ]; then
              echo "Health check failed: expected 'ok', got '${HEALTH_BODY}'"
              exit 1
            fi

            trap - EXIT
